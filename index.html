<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Hangman</title>

  <!-- Fonte moderna -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="home-screen" class="screen active">
    <div class="card">
      <h1>Hangman</h1>

      <p class="subtitle">Escolha uma categoria</p>

      <div id="category-buttons">
        <button data-category="tecnologia">Tecnologia</button>
        <button data-category="animais">Animais</button>
        <button data-category="paises">Países</button>
      </div>

      <div class="score-box">
        Pontuação: <span id="score-display">0</span>
      </div>

      <div class="leaderboard-box">
        <h3>Ranking</h3>
        <ul id="leaderboard"></ul>
      </div>
    </div>
  </div>

  <div id="game-screen" class="screen">
    <div class="card game-card">

      <div class="top-bar">
        <span id="category-title"></span>
        <span id="score-display-game"></span>
      </div>

      <div id="hangman"></div>
      <div id="word-display"></div>

      <div id="used-letters">
        <span id="letters-list"></span>
      </div>

    </div>

    <div id="bottom-bar"></div>
  </div>

  <div id="game-over-screen" class="overlay hidden">
    <div class="modal">
      <h2 id="game-result"></h2>
      <p id="final-word"></p>
      <p id="final-score"></p>

      <input type="text" id="player-name" placeholder="Seu nome" />

      <div class="actions">
        <button id="save-score-btn">Salvar</button>
        <button id="reset-btn">Jogar novamente</button>
        <button id="home-btn">Home</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
